appId: com.nicosoft.aistudio
productName: NicoSoft AI Studio
copyright: Copyright © NicoSoft

# Space-free, predictable asset names so release URLs and CI globbing stay simple, e.g.
# nicosoft-ai-studio-1.0.1-mac-arm64.dmg / -windows-x64.exe / -linux-x64.AppImage.
artifactName: ${name}-${version}-${os}-${arch}.${ext}

directories:
  # electron-builder auto-discovers build/icon.{icns,ico,png} here; icons are also set explicitly below.
  buildResources: build
  output: dist

# electron-vite emits the app to out/; ship that + the manifest, drop dev-only sources.
files:
  - out/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!e2e/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron-builder.yml'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintrc.cjs,.eslintignore,.prettierrc,.prettierignore,.editorconfig}'

# The built-in Studio product manual (the studio_guide tool reads it at runtime) — plain md shipped
# next to the asar: <process.resourcesPath>/studio-guide (services/studio-guide.ts resolves it there,
# falling back to the repo's resources/ folder in dev).
extraResources:
  - from: resources/studio-guide
    to: studio-guide

# node-pty is a native module (the Terminal panel's pty backend) — electron-builder must rebuild it
# against the target Electron's ABI at pack time (npmRebuild defaults to true; kept explicit). node:sqlite
# stays runtime-built, no action needed for it.
npmRebuild: true
# A native .node can't run from inside the asar archive — unpack node-pty (pty.node + its spawn-helper)
# so dlopen can load it at runtime.
asarUnpack:
  - '**/node_modules/node-pty/**'

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  # darkModeSupport keeps the title bar / vibrancy consistent with the dark UI.
  darkModeSupport: true

win:
  icon: build/icon.ico
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# GitHub provider. CI builds with `--publish never` and uploads through the workflow's release job
# (so a single job owns the release, avoiding a 3-runner race). Declaring it here still makes
# electron-builder emit the auto-update metadata (latest*.yml) into dist/ at pack time; those files
# ride along with the installers so a future electron-updater integration works without rework.
publish:
  provider: github
  owner: nicosoft-dev
  repo: nicosoft-ai-studio
