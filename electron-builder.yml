appId: com.nicosoft.aistudio
productName: NicoSoft AI Studio
copyright: Copyright © NicoSoft

directories:
  # electron-builder auto-discovers build/icon.{icns,ico,png} here; icons are also set explicitly below.
  buildResources: build
  output: dist

# electron-vite emits the app to out/; ship that + the manifest, drop dev-only sources.
files:
  - out/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!e2e/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron-builder.yml'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintrc.cjs,.eslintignore,.prettierrc,.prettierignore,.editorconfig}'

# node-pty is a native module (the Terminal panel's pty backend) — electron-builder must rebuild it
# against the target Electron's ABI at pack time (npmRebuild defaults to true; kept explicit). node:sqlite
# stays runtime-built, no action needed for it.
npmRebuild: true
# A native .node can't run from inside the asar archive — unpack node-pty (pty.node + its spawn-helper)
# so dlopen can load it at runtime.
asarUnpack:
  - '**/node_modules/node-pty/**'

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  # darkModeSupport keeps the title bar / vibrancy consistent with the dark UI.
  darkModeSupport: true

win:
  icon: build/icon.ico
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
