# Studio Lens ‚Äî UNDERSTAND template. A separate readers‚Üísynthesize pipeline (no build / VERDICT / refute):
# one read-only reader per target file, then a cross-file map. The caller's OWN role reads (no independent
# reviewer needed). Single file ‚Üí skip the synthesis (one summary IS the map).
name: understand
inputs: [paths, callerRole]
enabledSetting: gateB.studioLens.enabled
phases:
  - id: read
    type: parallel
    over: "${paths}"
    as: path
    role: caller
    kit: [Read, Grep, Glob]            # a reader never writes or builds ‚Äî no Bash
    system: READER_SYSTEM
    card:
      name: Subject
      phase: read
    prompt: |
      Read and understand this file as part of building a shared map of the project:
      {{path}}
    emit:
      contract: text
      as: summary

  - id: synth
    type: agent
    role: caller
    when: "${read.length >= 2}"          # one file's summary IS the map ‚Äî skip synthesis
    card:
      name: Synth
      phase: synth
    prompt: |
      You are building ONE shared understanding from independent per-file readings of a codebase / document
      set. Each summary below was written by a reader who saw ONLY its own file. Combine them into a SINGLE
      coherent map: open with a short orientation (what this set of files IS as a whole); then explain how the
      pieces FIT ‚Äî the cross-file connections, data/control flow, dependencies, and shared structures that no
      single-file summary could see; preserve the important per-file specifics but organize them by how they
      relate, not as a flat list. Factual and structural only ‚Äî NO judgment, NO pass/fail, NO recommendations.
      Keep it tight and well-structured (headings / short paragraphs).

      Per-file summaries:
      {{read.joined('## {path}\n{summary}', '\n\n')}}

# result: ‚Äî the map (synth, or the plain per-file concatenation when synthesis was skipped/failed) + the raw parts.
result:
  map: "${synth.text.orElse(read.joined('## {path}\n{summary}', '\n\n'))}"
  parts: "${read}"
