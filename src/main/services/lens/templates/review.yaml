# Studio Lens — REVIEW template. The find→dedup→verify→(sweep)→synth panel, REPLICATING Claude Code's bundled
# Workflow `code-review` (cc 2.1.186; decoded in docs/workflow-decoded/). EVERY part of the review SHAPE — how many
# finder angles, the per-finder candidate cap, the verify bias, whether a gap-sweep runs, the report cap — is the
# current reasoning effort's tier (Workflow CZa/k5n/RZa/vZa), resolved by the bridge from the reviewer's effective
# thinking depth and injected as ctx (tier/angles/candidateCap/verifyBias/runSweep/reportCap). NOTHING is hardcoded.
# The angle taxonomy is FIXED (lens/angles.ts, NOT model-authored). Orchestration is data; the engine owns the
# domain projections (§3).
name: review
inputs: [paths, diff, baseRef, task, implementerSummary, writtenFiles, floorVerdict, angles, candidateCap, verifyBias, runSweep, sweepAngle, reportCap]
enabledSetting: gateB.studioLens.enabled
# breadthInput is the caller's ENTRY INTENT, NOT a breadth level: 'thorough' = an EXPLICIT review request (always
# panel); 'conservative' = the Gate-B floor-amplifier (run the escalate throttle first). The review SHAPE is the
# effort tier's (resolved by the bridge — tiers.ts), never a caller-injected clause.
breadthInput: thorough
phases:
  # ESCALATE — the Gate-B throttle (conservative entry only; an explicit review skips straight to find).
  # Fail-open: a missing/garbled verdict → escalate=true (never silently drop the amplifier).
  - id: escalate
    type: agent
    role: reviewer
    when: "${breadthInput == 'conservative'}"
    output:
      escalate: bool
    prompt: |
      An independent FLOOR reviewer already verified this change. Decide whether to ESCALATE to a
      multi-perspective PANEL — several reviewers each probing a distinct risk axis the floor does not
      scrutinize at depth. The panel is an AMPLIFIER for SUBSTANTIAL work; a small, contained change is
      already covered by the floor alone. {{writtenFiles.length}} file(s) touched across
      {{writtenFiles.topLevelAreas.length}} top-level area(s); floor verdict: {{floorVerdict}}.
      Judge from the workload and the floor's own read — there is NO fixed file-count threshold. A broad,
      cross-cutting, or risk-laden change → ESCALATE: YES; a small single-area edit the floor already covers
      → ESCALATE: NO. When genuinely unsure, prefer YES (the floor is the safety net either way).
      End your reply with exactly one final line: `ESCALATE: YES` or `ESCALATE: NO` — nothing after it.

  # FIND — one finder per FIXED angle (the tier picks the set: 1 combined at low, 8 at medium/high, 10 at
  # xhigh/max), ALL in parallel (a BARRIER) so dedup can merge cross-angle duplicates before any verifier is spent
  # (Workflow Phase 1 → Phase 2). `over: ${angles}` is the tier's fixed taxonomy. Each finder reviews the PINNED
  # diff + enclosing functions only, ≤{{candidateCap}} candidates. Empty array trusted ONLY on VERDICT: PASS.
  - id: find
    phase: Review
    # Fire the panel only when warranted: an explicit (thorough) review always; the conservative Gate-B
    # floor-amplifier only when the escalate throttle said YES.
    when: "${breadthInput != 'conservative' || escalate.escalate}"
    type: parallel
    over: "${angles}"
    as: lens
    role: reviewer
    kit: read-only
    card:
      name: Subject
      phase: find
      subject: "${lens.key}"
    prompt: |
      Run your "{{lens.key}}" lens: {{lens.focus}}

      The change under review (unified diff — your PRIMARY input; review THIS):
      {{diff}}

      Output UP TO {{candidateCap}} candidate findings, ranked most-severe first. If more than {{candidateCap}}
      qualify, keep the {{candidateCap}} most severe.

      Target file(s): {{paths}}. Read the ENCLOSING function of a hunk in these files ONLY when your angle needs
      context the diff does not show. Do NOT read whole files end-to-end, and do NOT read files outside the target
      set or explore the rest of the repo — that is out of scope and wastes the review.

      Original task:
      {{task}}

      Implementer's own summary (a claim to verify, not ground truth):
      {{implementerSummary}}
    output:
      verdict: PASS|FAIL
      candidates:
        - summary: string
          file: string
          line: int
          severity: high|med|low
          failure_scenario: string
    emit:
      contract: findings
      degradeTo: verdict
      trustEmptyOn: PASS

  # DEDUP — Workflow Phase-2 opener (SKIPPED at low: verifyBias='none'). Collapse candidates that are the SAME
  # defect at the SAME location AND the SAME reason — `by: [file, line, title]` (title = the finder's one-line
  # `summary`; "same defect, same location, same reason"). Keeps the most-concrete representative, removes the rest
  # IN PLACE so verify spends one skeptic per DISTINCT defect. file+line WITHOUT title would over-merge two
  # different defects on the same line; including title is conservative (only true duplicates merge).
  - id: dedup
    when: "${verifyBias != 'none' && (breadthInput != 'conservative' || escalate.escalate)}"
    type: dedup
    over: "${find}"
    by: [file, line, title]

  # VERIFY — ONE skeptic per DEDUPED candidate (SKIPPED at low). 1-vote (Workflow code-review, NOT majority
  # voting — that's deep-research). The refute persona's lean is the tier's: precision (medium) / recall
  # (high/xhigh/max), picked by the engine from ctx.verifyBias. failVote=uphold: a broken vote never drops a defect.
  - id: verify
    phase: Verify
    when: "${verifyBias != 'none' && (breadthInput != 'conservative' || escalate.escalate)}"
    type: refute
    over: "${find.pluck(candidates).flat}"
    as: cand
    voters: 1
    failVote: uphold
    card:
      name: SubjectRefute
      phase: verify
      subject: "${cand.id}"
    prompt: |
      An independent "{{cand.lens}}" finder flagged ONE candidate defect. Classify it CONFIRMED / PLAUSIBLE /
      REFUTED against the change below — a single vote. Keep CONFIRMED + PLAUSIBLE; drop only REFUTED.

      The change under review (unified diff):
      {{diff}}

      Candidate to verify:
      [{{cand.severity}}] {{cand.title}} ({{cand.file}})
      Mechanism: {{cand.mechanism}}

      Read the cited file's relevant lines ONLY if the diff above does not show enough to decide. Do NOT read
      whole files or explore the repo beyond the candidate's site.

      Original task:
      {{task}}

      Implementer's own summary:
      {{implementerSummary}}

  # SWEEP — Workflow Phase 3 (xhigh/max ONLY: ctx.runSweep). One fresh finder that HAS the confirmed list, hunting
  # ONLY gaps the first pass missed (≤{{candidateCap}} new), then its candidates go through the same 1-vote verify.
  - id: sweep
    phase: Review
    when: "${runSweep}"
    type: parallel
    over: "${sweepAngle}"
    as: lens
    role: reviewer
    kit: read-only
    card:
      name: Subject
      phase: find
      subject: "${lens.key}"
    prompt: |
      {{lens.focus}}

      The change under review (unified diff):
      {{diff}}

      Already-confirmed findings — do NOT re-report these; surface only NEW gaps:
      {{find.pluck(candidates).flat.where(refuted != true)}}

      Output UP TO {{candidateCap}} NEW candidate findings (defects not on the list above), ranked most-severe
      first. Read enclosing functions only — no whole-file or whole-repo scans. If nothing new, output [].

      Original task:
      {{task}}
    output:
      verdict: PASS|FAIL
      candidates:
        - summary: string
          file: string
          line: int
          severity: high|med|low
          failure_scenario: string
    emit:
      contract: findings
      degradeTo: verdict
      trustEmptyOn: PASS

  - id: sweepverify
    phase: Verify
    when: "${runSweep}"
    type: refute
    over: "${sweep.pluck(candidates).flat}"
    as: cand
    voters: 1
    failVote: uphold
    card:
      name: SubjectRefute
      phase: verify
      subject: "${cand.id}"
    prompt: |
      An independent SWEEP finder flagged ONE candidate defect. Classify it CONFIRMED / PLAUSIBLE / REFUTED
      against the change below — a single vote. Keep CONFIRMED + PLAUSIBLE; drop only REFUTED.

      The change under review (unified diff):
      {{diff}}

      Candidate to verify:
      [{{cand.severity}}] {{cand.title}} ({{cand.file}})
      Mechanism: {{cand.mechanism}}

      Read the cited file's relevant lines ONLY if the diff above does not show enough. Do NOT read whole files
      or explore the repo beyond the candidate's site.

      Original task:
      {{task}}

  # SYNTHESIZE — the lead-reviewer turn. Confirmed = find ∪ sweep (survived verify), most-severe-first, capped to
  # the tier's reportCap (Workflow `at most N`). Only runs when a confirmed defect survived.
  - id: synth
    phase: Synthesize
    type: agent
    role: reviewer
    when: "${find.pluck(candidates).flat.where(refuted != true).concat(sweep.pluck(candidates).flat.where(refuted != true)).length > 0}"
    card:
      name: Synth
      phase: synth
    output:
      report: string
    prompt: |
      You are the LEAD REVIEWER. An independent panel hunted the SAME code across multiple risk angles; every
      candidate below survived verification (the false alarms were already dropped). Synthesize the CONFIRMED
      findings into ONE final, actionable review report for the engineer who wrote the code.

      - De-duplicate: if several angles confirmed the SAME underlying issue, state it ONCE.
      - Lead with the real defects, most severe first. For each: WHAT is wrong, WHERE (file:line when cited),
        WHY it matters, and a concrete FIX.
      - Be tight and concrete — no preamble, no restating these instructions. This goes straight to the engineer.

      Confirmed findings (survived verification), most-severe first (at most {{reportCap}} — correctness outranks cleanup):
      {{find.pluck(candidates).flat.where(refuted != true).concat(sweep.pluck(candidates).flat.where(refuted != true)).orderBy(severity, asc).take(reportCap)}}

# result: — the YAML归约 projection (find ∪ sweep). The engine layers the domain projections (subjects[] / ok /
# message / reviewer / recordExamine payload) on top in the bridge (§3①/M-7).
result:
  confirmed: "${find.pluck(candidates).flat.where(refuted != true).concat(sweep.pluck(candidates).flat.where(refuted != true)).orderBy(severity, asc).take(reportCap)}"
  refuted: "${find.pluck(candidates).flat.where(refuted == true).concat(sweep.pluck(candidates).flat.where(refuted == true))}"
  candidates: "${find.pluck(candidates).flat.concat(sweep.pluck(candidates).flat)}"
  report: "${synth.report}"
