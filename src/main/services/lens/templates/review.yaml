# Studio Lens — REVIEW template. The find→verify→synth panel, REPLICATING the Claude Code Workflow `code-review`
# workflow (cc 2.1.186): a FIXED angle taxonomy (lens/angles.ts, injected as ctx.angles — NOT model-authored;
# the old self-derived `select` step over-produced lenses and drove the fan-out explosion), one finder per angle,
# ONE recall-biased skeptic per candidate, then a capped synthesis. Orchestration is data; the engine owns the
# domain projections (§3).
name: review
inputs: [paths, diff, content, baseRef, task, implementerSummary, writtenFiles, floorVerdict, angles]
enabledSetting: gateB.studioLens.enabled
# breadthInput is the caller's ENTRY INTENT, NOT a breadth level: 'thorough' = an EXPLICIT review request
# (skip the throttle, always panel); 'conservative' = the Gate-B floor-amplifier (run the escalate throttle
# first). The actual breadth — HOW MANY lenses — is the SELECT step's OWN model-decided call: it authors the
# count from the code, never a fixed 2-value clause injected by the caller (was vars.breadthClause).
breadthInput: thorough
phases:
  # ESCALATE — the Gate-B throttle (only 'conservative' entry runs it; explicit review skips straight to select).
  # Fail-open: a missing/garbled verdict → escalate=true (never silently drop the amplifier).
  - id: escalate
    type: agent
    role: reviewer
    when: "${breadthInput == 'conservative'}"
    output:
      escalate: bool
    prompt: |
      An independent FLOOR reviewer already verified this change. Decide whether to ESCALATE to a
      multi-perspective PANEL — several reviewers each probing a distinct risk axis the floor does not
      scrutinize at depth. The panel is an AMPLIFIER for SUBSTANTIAL work; a small, contained change is
      already covered by the floor alone. {{writtenFiles.length}} file(s) touched across
      {{writtenFiles.topLevelAreas.length}} top-level area(s); floor verdict: {{floorVerdict}}.
      Judge from the workload and the floor's own read — there is NO fixed file-count threshold. A broad,
      cross-cutting, or risk-laden change → ESCALATE: YES; a small single-area edit the floor already covers
      → ESCALATE: NO. When genuinely unsure, prefer YES (the floor is the safety net either way).
      End your reply with exactly one final line: `ESCALATE: YES` or `ESCALATE: NO` — nothing after it.

  # FIND — one finder per FIXED angle, ALL in parallel (a BARRIER): every angle completes before verify, so the
  # dedup step can merge cross-angle duplicates before any verifier is spent (Workflow Phase 1 → Phase 2). This is
  # Workflow's real shape: a per-angle find→verify pipeline could not dedup ACROSS angles, so it burned a skeptic
  # on every angle's copy of the same defect. `over: ${angles}` is the FIXED taxonomy (lens/angles.ts) — Workflow
  # runs a fixed angle set, it does NOT author angles from the code. Returns the per-angle SubjectFinding[]; the
  # verify fold writes each candidate's verdict back onto it, so `find.pluck(candidates).flat` is the result's list.
  - id: find
    phase: Review
    # Fire the panel only when warranted: an explicit (thorough) review always; the conservative Gate-B
    # floor-amplifier only when the escalate throttle said YES (the gate the deleted `select` step used to carry).
    when: "${breadthInput != 'conservative' || escalate.escalate}"
    type: parallel
    over: "${angles}"
    as: lens
    role: reviewer
    kit: read-only
    card:
      name: Subject
      phase: find
      subject: "${lens.key}"
    prompt: |
      Run your "{{lens.key}}" lens: {{lens.focus}}

      The change under review (unified diff — your PRIMARY input; review THIS):
      {{diff}}

      Target file(s): {{paths}}. Read the ENCLOSING function of a hunk in these files ONLY when your angle needs
      context the diff does not show. Do NOT read whole files end-to-end, and do NOT read files outside the target
      set or explore the rest of the repo — that is out of scope and wastes the review.

      Original task:
      {{task}}

      Implementer's own summary (a claim to verify, not ground truth):
      {{implementerSummary}}
    output:
      verdict: PASS|FAIL
      candidates:
        - title: string
          file: string
          line: int
          severity: high|med|low
          mechanism: string
    emit:
      contract: findings
      degradeTo: verdict
      trustEmptyOn: PASS

  # DEDUP — Workflow Phase-2 opener: "Dedup near-duplicates (same defect, same location → keep one)" BEFORE any
  # verifier is spent. The fixed angles overlap on purpose (line-scan + cross-file can flag the same line), so one
  # defect flagged by N angles collapses to ONE candidate here (the most-severe / most-concrete representative is
  # kept; the rest are removed from their angle IN PLACE). So verify spends one skeptic per DISTINCT defect and the
  # per-angle fold reads the deduped set — no phantom "survived" from an un-voted duplicate.
  - id: dedup
    when: "${breadthInput != 'conservative' || escalate.escalate}"
    type: dedup
    over: "${find}"
    by: [file, line]

  # VERIFY — ONE recall-biased skeptic per DEDUPED candidate (over: ${find.pluck(candidates).flat}, the cross-angle
  # flat list the dedup step collapsed). This is Workflow's "Verify (1-vote, recall-biased)" EXACTLY: a single
  # verifier per candidate, kept unless REFUTED (the refutePrompt persona is PLAUSIBLE-by-default). The old
  # votersByConfidence {high:2,med:3,low:5} (avg ~2.4, up to 5) was the single biggest skeptic-count divergence —
  # code-review is 1 vote, NOT majority voting (the 3-vote pattern is deep-research over web claims). majority =
  # floor(1/2)+1 = 1, so the one skeptic decides. failVote=uphold: an infra-failed / unparseable vote never drops a
  # real defect (recall-biased). The fold writes each candidate's verdict back onto its source angle in `find`.
  - id: verify
    phase: Verify
    when: "${breadthInput != 'conservative' || escalate.escalate}"
    type: refute
    over: "${find.pluck(candidates).flat}"
    as: cand
    voters: 1
    failVote: uphold
    card:
      name: SubjectRefute
      phase: verify
      subject: "${cand.id}"
    system: "refutePrompt(${cand.focus})"
    prompt: |
      An independent "{{cand.lens}}" finder flagged ONE candidate defect. Verify it against the change below —
      single-vote, recall-biased: keep it unless you can show FROM THE CODE that it is wrong.

      The change under review (unified diff):
      {{diff}}

      Candidate to verify:
      [{{cand.severity}}] {{cand.title}} ({{cand.file}})
      Mechanism: {{cand.mechanism}}

      Read the cited file's relevant lines ONLY if the diff above does not show enough to decide. Do NOT read
      whole files or explore the repo beyond the candidate's site.

      Original task:
      {{task}}

      Implementer's own summary:
      {{implementerSummary}}

  # SYNTHESIZE — the lead-reviewer turn (tool-less one-shot, the chatOnce seam): dedup the CONFIRMED findings
  # into one actionable report, severity-first. Only runs when a confirmed defect survived refute.
  - id: synth
    phase: Synthesize
    type: agent
    role: reviewer
    when: "${find.pluck(candidates).flat.where(refuted == false).length > 0}"
    card:
      name: Synth
      phase: synth
    output:
      report: string
    prompt: |
      You are the LEAD REVIEWER. An independent panel hunted the SAME code across multiple risk lenses; every
      candidate below survived adversarial refutation (the false alarms were already dropped). Synthesize the
      CONFIRMED findings into ONE final, actionable review report for the engineer who wrote the code.

      - De-duplicate: if several lenses confirmed the SAME underlying issue, state it ONCE.
      - Lead with the real defects, most severe first. For each: WHAT is wrong, WHERE (file:line when cited),
        WHY it matters, and a concrete FIX.
      - Be tight and concrete — no preamble, no restating these instructions. This goes straight to the engineer.

      Confirmed findings (survived verification), most-severe first (at most 10 — correctness outranks cleanup):
      {{find.pluck(candidates).flat.where(refuted == false).orderBy(severity, asc).take(10)}}

# result: — the YAML归约 projection. The engine layers the domain projections (subjects[] / ok / message /
# reviewer / recordExamine payload) on top in the bridge (§3①/M-7); they are NOT expressible as归约.
result:
  confirmed: "${find.pluck(candidates).flat.where(refuted == false).orderBy(severity, asc).take(10)}"
  refuted: "${find.pluck(candidates).flat.where(refuted == true)}"
  candidates: "${find.pluck(candidates).flat}"
  report: "${synth.report}"
